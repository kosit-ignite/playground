<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreLeader</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Import Map -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0"
            }
        }
    </script>
    
    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles */
        body { background-color: #0f172a; color: white; }
        .clip-arrow { clip-path: polygon(50% 100%, 0% 0%, 100% 0%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Button Utilities */
        .btn-primary { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background-color: #2563eb; color: white; border-radius: 0.75rem; font-weight: 700; font-size: 0.75rem; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { background-color: #3b82f6; }
        
        .btn-secondary { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background-color: #1e293b; color: #94a3b8; border-radius: 0.75rem; border: 1px solid #334155; font-weight: 700; font-size: 0.75rem; transition: all 0.2s; }
        .btn-secondary:hover { background-color: #334155; color: #f8fafc; }
        
        /* Custom Select Style to fix dropdown arrow overlap & colors */
        select {
            background-image: none;
        }
        option {
            background-color: #0f172a;
            color: white;
        }
        
        /* Text Shadow for wheel labels */
        .wheel-text-shadow {
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 4. The Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Trophy, Medal, Crown, Plus, Minus, RotateCcw, Edit2, Check, User, Search, Trash2, UserPlus, Dices, X, Calendar, Users, UserCircle, ChevronDown, Save, Settings, Play, Layers, Download, Sparkles, Upload, FileJson, Eye, EyeOff } from 'lucide-react';

        // --- Constants ---
        const PRESET_GROUP_NAMES = [
            'Red Dragon', 'Blue Shark', 'Green Eagle', 'Yellow Tiger', 
            'Purple Cobra', 'Orange Fox', 'Black Panther', 'White Wolf'
        ];

        const STORAGE_KEY = 'leaderboard_data_v5_final';

        // --- Helper Functions ---
        const generateDefaults = () => {
            const newParticipants = [];
            let pId = 1;
            const groups = 4;
            const perGroup = 5;
            const activeGroups = PRESET_GROUP_NAMES.slice(0, groups);
            
            for (let g = 0; g < groups; g++) {
                const groupName = activeGroups[g];
                for (let p = 0; p < perGroup; p++) {
                    newParticipants.push({
                        id: pId,
                        name: `Player ${pId}`,
                        group: groupName,
                        scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        change: 0,
                        isActive: true
                    });
                    pId++;
                }
            }
            return { participants: newParticipants, groups: activeGroups };
        };

        // --- Components ---

        const Confetti = ({ active }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!active) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const particles = [];
                const colors = ['#0056b3', '#dc2626', '#06b6d4', '#7c3aed', '#f59e0b'];
                
                for (let i = 0; i < 150; i++) {
                    particles.push({
                        x: window.innerWidth / 2,
                        y: window.innerHeight / 2,
                        vx: (Math.random() - 0.5) * 20,
                        vy: (Math.random() - 0.5) * 20,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: Math.random() * 8 + 4,
                        life: 100
                    });
                }
                
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let activeParticles = false;
                    particles.forEach(p => {
                        if (p.life > 0) {
                            activeParticles = true;
                            p.x += p.vx;
                            p.y += p.vy;
                            p.vy += 0.5;
                            p.life -= 1;
                            p.size *= 0.96;
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                    if (activeParticles) requestAnimationFrame(animate);
                };
                animate();
            }, [active]);
            if (!active) return null;
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[60]" />;
        };

        function App() {
            // --- State Initialization ---
            const [participants, setParticipants] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.participants) {
                            return parsed.participants.map(p => ({
                                ...p, isActive: p.isActive !== undefined ? p.isActive : true
                            }));
                        }
                    }
                } catch(e) {}
                return generateDefaults().participants;
            });

            const [availableGroups, setAvailableGroups] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.groups) return parsed.groups;
                    }
                } catch(e) {}
                return generateDefaults().groups;
            });

            const [activeDay, setActiveDay] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.activeDay) return parsed.activeDay;
                    }
                } catch(e) {}
                return 1;
            });

            const [isAdmin, setIsAdmin] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [lastUpdatedId, setLastUpdatedId] = useState(null);
            const [viewMode, setViewMode] = useState('individual');
            const [loaded, setLoaded] = useState(true);
            
            // UI State
            const [showGroupManager, setShowGroupManager] = useState(false);
            const [newGroupName, setNewGroupName] = useState('');
            const [celebrate, setCelebrate] = useState(false);

            // Wheel State
            const [showWheel, setShowWheel] = useState(false);
            const [wheelMode, setWheelMode] = useState('individual'); 
            const [isSpinning, setIsSpinning] = useState(false);
            const [wheelRotation, setWheelRotation] = useState(0);
            const [wheelWinner, setWheelWinner] = useState(null);

            // File Input Ref
            const fileInputRef = useRef(null);

            // Auto-Save Effect
            useEffect(() => {
                if (participants.length > 0) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        participants,
                        groups: availableGroups,
                        activeDay
                    }));
                }
            }, [participants, availableGroups, activeDay]);

            // --- Computed Data ---
            const getTotal = (p) => Object.values(p.scores || {}).reduce((a, b) => a + b, 0);

            const sanitizedGroups = React.useMemo(() => {
                const usedGroups = new Set(participants.map(p => p.group).filter(Boolean));
                const allGroups = new Set([...availableGroups, ...usedGroups]);
                return Array.from(allGroups).sort();
            }, [participants, availableGroups]);

            const groupsData = React.useMemo(() => {
                const groups = {};
                sanitizedGroups.forEach(g => {
                    groups[g] = { name: g, totalScore: 0, members: [], change: 0, activeCount: 0 };
                });

                participants.forEach(p => {
                    const gName = p.group || 'Unassigned';
                    if (!groups[gName]) {
                        groups[gName] = { name: gName, totalScore: 0, members: [], change: 0, activeCount: 0 };
                    }
                    if (p.isActive) {
                        groups[gName].totalScore += getTotal(p);
                        groups[gName].activeCount += 1;
                    }
                    groups[gName].members.push(p);
                    if (p.change !== 0) groups[gName].change = p.change; 
                });
                return Object.values(groups).sort((a, b) => b.totalScore - a.totalScore);
            }, [participants, sanitizedGroups]);

            const sortedParticipants = [...participants].sort((a, b) => {
                const scoreA = getTotal(a);
                const scoreB = getTotal(b);
                if (scoreB !== scoreA) return scoreB - scoreA;
                return a.name.localeCompare(b.name);
            });

            // --- Wheel Items Logic (Active items only) ---
            const activeWheelItems = React.useMemo(() => {
                return wheelMode === 'individual' 
                    ? participants.filter(p => p.isActive) 
                    : groupsData.filter(g => g.activeCount > 0);
            }, [participants, groupsData, wheelMode]);

            // --- Export / Backup Logic ---
            const exportToCSV = () => {
                const headers = ['ID', 'Name', 'Group', 'Status', 'Day 1', 'Day 2', 'Day 3', 'Day 4', 'Total Score'];
                const rows = sortedParticipants.map(p => [
                    p.id,
                    `"${p.name}"`, 
                    `"${p.group}"`,
                    p.isActive ? 'Active' : 'Inactive',
                    p.scores[1] || 0,
                    p.scores[2] || 0,
                    p.scores[3] || 0,
                    p.scores[4] || 0,
                    getTotal(p)
                ]);
                
                const csvContent = "data:text/csv;charset=utf-8," 
                    + headers.join(",") + "\n" 
                    + rows.map(e => e.join(",")).join("\n");

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `leaderboard_export_day${activeDay}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const downloadBackup = () => {
                const dataStr = JSON.stringify({ participants, groups: availableGroups, activeDay }, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `scoreleader_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleRestoreBackup = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed.participants && Array.isArray(parsed.participants)) {
                            if(window.confirm("CAUTION: This will overwrite current data. Continue?")) {
                                const validated = parsed.participants.map(p => ({
                                    ...p, isActive: p.isActive !== undefined ? p.isActive : true
                                }));
                                setParticipants(validated);
                                if (parsed.groups) setAvailableGroups(parsed.groups);
                                if (parsed.activeDay) setActiveDay(parsed.activeDay);
                                alert("Restored successfully!");
                            }
                        } else {
                            alert("Invalid backup file.");
                        }
                    } catch (err) {
                        alert("Error reading file.");
                    }
                    if(fileInputRef.current) fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };

            // --- Player Management ---
            const toggleActive = (id) => {
                setParticipants(prev => prev.map(p => p.id === id ? { ...p, isActive: !p.isActive } : p));
            };

            const addParticipant = () => {
                const newId = (Math.max(...participants.map(p => p.id), 0) || 0) + 1;
                setParticipants([...participants, {
                    id: newId,
                    name: `Player ${newId}`,
                    group: sanitizedGroups[0] || 'Unassigned',
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    change: 0,
                    isActive: true
                }]);
            };

            const removeParticipant = (id) => {
                if (window.confirm('Remove this participant permanently?')) {
                    setParticipants(prev => prev.filter(p => p.id !== id));
                }
            };

            // --- Group Management Logic ---
            const addGroup = () => {
                const name = newGroupName.trim();
                if (!name) return;
                if (sanitizedGroups.includes(name)) {
                    alert("Group already exists!");
                    return;
                }
                setAvailableGroups([...availableGroups, name]);
                setNewGroupName('');
            };

            const deleteGroup = (groupToDelete) => {
                const remainingGroups = availableGroups.filter(g => g !== groupToDelete);
                if (remainingGroups.length === 0) {
                    if (!window.confirm("Last group! Players will become 'Unassigned'. Continue?")) return;
                    setParticipants(prev => prev.map(p => p.group === groupToDelete ? { ...p, group: 'Unassigned' } : p));
                    setAvailableGroups([]);
                    return;
                }
                if (!window.confirm(`Delete "${groupToDelete}"? Members will be distributed to other groups.`)) return;
                setParticipants(prev => {
                    let i = 0;
                    return prev.map(p => {
                        if (p.group === groupToDelete) {
                            const target = remainingGroups[i % remainingGroups.length];
                            i++;
                            return { ...p, group: target };
                        }
                        return p;
                    });
                });
                setAvailableGroups(remainingGroups);
            };

            const renameGroup = (oldName, newName) => {
                if (!newName || !newName.trim() || oldName === newName) return;
                const trimmedNew = newName.trim();
                setAvailableGroups(prev => prev.map(g => g === oldName ? trimmedNew : g));
                setParticipants(prev => prev.map(p => p.group === oldName ? { ...p, group: trimmedNew } : p));
            };

            // --- Score Management ---
            const updateScore = (targetIdOrName, delta, isGroupUpdate) => {
                setParticipants(prev => prev.map(p => {
                    const shouldUpdate = isGroupUpdate ? p.group === targetIdOrName : p.id === targetIdOrName;
                    if (shouldUpdate && p.isActive) {
                        const newDayScore = Math.max(0, (p.scores[activeDay] || 0) + delta);
                        return { ...p, scores: { ...p.scores, [activeDay]: newDayScore }, change: delta };
                    }
                    return { ...p, change: 0 };
                }));
                setLastUpdatedId(targetIdOrName);
                setTimeout(() => {
                    setParticipants(prev => prev.map(p => {
                        if ((isGroupUpdate ? p.group === targetIdOrName : p.id === targetIdOrName)) return { ...p, change: 0 };
                        return p;
                    }));
                    setLastUpdatedId(null);
                }, 1000);
            };

            const updateParticipantData = (id, field, value) => {
                setParticipants(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
            };

            const resetScores = (type) => {
                if (window.confirm(type === 'daily' ? 'Reset ALL scores for ALL days?' : 'Full Reset to defaults?')) {
                    if (type === 'hard') {
                        const defaults = generateDefaults();
                        setParticipants(defaults.participants);
                        setAvailableGroups(defaults.groups);
                        setActiveDay(1);
                    } else {
                        setParticipants(prev => prev.map(p => ({ ...p, scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, change: 0 })));
                    }
                }
            };

            // --- Wheel Logic ---
            const spinWheel = () => {
                if (isSpinning) return;
                setWheelWinner(null);
                setIsSpinning(true);
                setCelebrate(false);
                
                const randomSpins = 1800 + Math.random() * 1800;
                setWheelRotation(prev => prev + randomSpins);
                
                setTimeout(() => {
                    setIsSpinning(false);
                    const degrees = (wheelRotation + randomSpins) % 360;
                    const items = activeWheelItems;
                    
                    if (items.length > 0) {
                        const segmentSize = 360 / items.length;
                        const normalizedDegree = (360 - degrees + 90) % 360; 
                        const winningIndex = Math.floor(normalizedDegree / segmentSize) % items.length;
                        setWheelWinner(items[winningIndex]);
                        setCelebrate(true);
                        setTimeout(() => setCelebrate(false), 3000);
                    }
                }, 3000);
            };

            const awardWheelPoints = (points) => {
                if (wheelWinner) {
                    updateScore(wheelWinner.id || wheelWinner.name, points, wheelMode === 'group');
                    setWheelWinner(null);
                    setShowWheel(false);
                }
            };

            // --- Rendering ---
            const getRankStyle = (index) => {
                switch(index) {
                    case 0: return "bg-yellow-500/10 border-yellow-500 text-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.2)]";
                    case 1: return "bg-slate-400/10 border-slate-400 text-slate-300 shadow-[0_0_10px_rgba(148,163,184,0.1)]";
                    case 2: return "bg-orange-500/10 border-orange-500 text-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.1)]";
                    default: return "bg-slate-700/50 border-slate-600 text-slate-500";
                }
            };

            const getRankIcon = (index) => {
                switch(index) {
                    case 0: return <Crown className="w-8 h-8 text-yellow-500 fill-yellow-500 animate-pulse" />;
                    case 1: return <Medal className="w-6 h-6 text-slate-400 fill-slate-300" />;
                    case 2: return <Medal className="w-6 h-6 text-orange-500 fill-orange-500" />;
                    default: return <span className="font-bold text-slate-400 text-xl w-8 text-center">{index + 1}</span>;
                }
            };

            const getWheelGradient = () => {
                const items = activeWheelItems;
                const colors = ['#0056b3', '#ef4444', '#06b6d4', '#7c3aed', '#f97316', '#db2777'];
                if (items.length === 0) return 'gray';
                return `conic-gradient(${items.map((_, i) => `${colors[i % colors.length]} ${(i/items.length)*100}% ${((i+1)/items.length)*100}%`).join(', ')})`;
            };

            const podiumData = (viewMode === 'individual' ? sortedParticipants : groupsData).filter(p => p.isActive !== false && (viewMode === 'individual' || p.activeCount > 0));
            
            const filteredList = (viewMode === 'group' ? groupsData : sortedParticipants).filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    (item.group && item.group.toLowerCase().includes(searchTerm.toLowerCase()));
                const isVisible = isAdmin ? true : (item.isActive !== false && (viewMode === 'individual' || item.activeCount > 0));
                return matchesSearch && isVisible;
            });

            return (
                <div className="min-h-screen bg-slate-900 font-sans text-slate-100 flex flex-col selection:bg-blue-500/30">
                    <Confetti active={celebrate} />
                    <input type="file" ref={fileInputRef} onChange={handleRestoreBackup} style={{ display: 'none' }} accept=".json" />

                    {/* Navbar */}
                    <nav className="bg-slate-800/80 backdrop-blur-md border-b border-slate-700 sticky top-0 z-40 shadow-xl">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-700 p-2.5 rounded-xl shadow-lg shadow-blue-600/30 ring-1 ring-white/10">
                                    <Trophy className="w-6 h-6 text-white" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-300 to-red-400 tracking-tight leading-none mb-0.5">
                                        ScoreLeader
                                    </h1>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button onClick={() => { setShowWheel(true); setWheelMode(viewMode); }} className="group flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-blue-600 via-purple-600 to-red-600 text-white rounded-full hover:from-blue-500 hover:to-red-500 transition-all shadow-lg active:scale-95 border border-white/10">
                                    <Dices className="w-5 h-5 group-hover:rotate-12 transition-transform" />
                                    <span className="hidden sm:inline font-bold">Wheel</span>
                                </button>
                                <button onClick={() => setIsAdmin(!isAdmin)} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all border ${isAdmin ? "bg-blue-500/20 text-blue-300 border-blue-500/50" : "bg-slate-800 text-slate-400 border-slate-700"}`}>
                                    {isAdmin ? <Check className="w-4 h-4" /> : <Edit2 className="w-4 h-4" />}
                                    {isAdmin ? "Done" : "Edit"}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* View Toggle */}
                    <div className="px-4 py-4 bg-slate-800/50 border-b border-slate-700 flex justify-center backdrop-blur-sm shadow-sm relative z-30">
                        <div className="flex bg-slate-900/80 p-1.5 rounded-xl border border-slate-700 w-full max-w-sm shadow-inner">
                            {['individual', 'group'].map(mode => (
                                <button key={mode} onClick={() => setViewMode(mode)} className={`flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all duration-200 ${viewMode === mode ? 'bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'}`}>
                                    {mode === 'individual' ? <UserCircle className="w-4 h-4" /> : <Users className="w-4 h-4" />}
                                    <span className="capitalize">{mode}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8 flex-grow w-full">
                        {/* Day Selector */}
                        <div className="flex justify-center">
                            <div className="bg-slate-800/80 p-1.5 rounded-2xl flex gap-1 overflow-x-auto border border-slate-700 shadow-xl max-w-full no-scrollbar">
                                {[1, 2, 3, 4].map((day) => (
                                    <button key={day} onClick={() => setActiveDay(day)} className={`min-w-[100px] flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-base font-bold transition-all whitespace-nowrap border ${activeDay === day ? "bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/50" : "bg-transparent border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200"}`}>
                                        <Calendar className="w-4 h-4" /> Day {day}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Podium Section */}
                        {podiumData.length >= 3 && !searchTerm && (
                            <div className="grid grid-cols-3 gap-4 items-end mt-24 mb-16 h-80 sm:h-[420px] relative px-2">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-blue-500/10 blur-[100px] -z-10 rounded-full animate-pulse"></div>
                                {/* 2nd */}
                                <div className="col-span-1 flex flex-col items-center justify-end h-full">
                                    <div className="relative w-full max-w-[220px] flex flex-col items-center group">
                                        <div className="mb-2 text-center w-full z-20 transition-transform group-hover:-translate-y-2 duration-300">
                                            <div className="font-bold text-slate-300 text-lg sm:text-2xl truncate w-full px-2">{podiumData[1].name}</div>
                                            <div className="text-white text-3xl sm:text-5xl font-black mt-1 drop-shadow-lg tracking-tight">
                                                {viewMode === 'individual' ? getTotal(podiumData[1]) : podiumData[1].totalScore}<span className="text-xs sm:text-sm font-bold text-slate-400 ml-1">PTS</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-700 p-3 rounded-full shadow-lg z-20 -mb-8 ring-4 ring-slate-600 relative"><Medal className="w-10 h-10 text-slate-300" /></div>
                                        <div className="w-full bg-gradient-to-b from-slate-700 to-slate-800 rounded-t-2xl h-40 sm:h-52 flex items-start justify-center pt-8 border-t-4 border-slate-500 shadow-2xl relative overflow-hidden"><span className="text-8xl font-black text-slate-600/30 absolute bottom-0 select-none">2</span></div>
                                    </div>
                                </div>
                                {/* 1st */}
                                <div className="col-span-1 flex flex-col items-center justify-end h-full z-10 -mx-2 sm:mx-0">
                                    <div className="relative w-full max-w-[260px] flex flex-col items-center group">
                                        <div className="mb-2 text-center transform scale-110 w-full z-20 transition-transform group-hover:-translate-y-2 duration-300">
                                            <div className="font-bold text-blue-200 text-xl sm:text-3xl truncate w-full px-2 drop-shadow-md">{podiumData[0].name}</div>
                                            <div className="text-yellow-400 text-5xl sm:text-7xl font-black mt-2 drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] tracking-tight">
                                                {viewMode === 'individual' ? getTotal(podiumData[0]) : podiumData[0].totalScore}<span className="text-sm sm:text-lg font-bold text-yellow-500/80 ml-1">PTS</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800 p-4 rounded-full shadow-xl z-20 -mb-10 ring-4 ring-yellow-500 shadow-yellow-500/20 relative"><Crown className="w-12 h-12 text-yellow-500 fill-yellow-500 animate-[bounce_3s_infinite]" /></div>
                                        <div className="w-full bg-gradient-to-b from-blue-900/40 to-slate-800 rounded-t-2xl h-52 sm:h-64 flex items-start justify-center pt-8 border-t-4 border-yellow-500 shadow-[0_0_50px_rgba(234,179,8,0.15)] relative overflow-hidden"><span className="text-9xl font-black text-yellow-600/20 absolute bottom-0 select-none">1</span></div>
                                    </div>
                                </div>
                                {/* 3rd */}
                                <div className="col-span-1 flex flex-col items-center justify-end h-full">
                                    <div className="relative w-full max-w-[220px] flex flex-col items-center group">
                                        <div className="mb-2 text-center w-full z-20 transition-transform group-hover:-translate-y-2 duration-300">
                                            <div className="font-bold text-orange-200 text-lg sm:text-2xl truncate w-full px-2">{podiumData[2].name}</div>
                                            <div className="text-white text-3xl sm:text-5xl font-black mt-1 drop-shadow-lg tracking-tight">
                                                {viewMode === 'individual' ? getTotal(podiumData[2]) : podiumData[2].totalScore}<span className="text-xs sm:text-sm font-bold text-slate-400 ml-1">PTS</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-700 p-3 rounded-full shadow-lg z-20 -mb-8 ring-4 ring-orange-600/50 relative"><Medal className="w-10 h-10 text-orange-400" /></div>
                                        <div className="w-full bg-gradient-to-b from-slate-700 to-slate-800 rounded-t-2xl h-32 sm:h-44 flex items-start justify-center pt-8 border-t-4 border-orange-500 shadow-2xl relative overflow-hidden"><span className="text-8xl font-black text-orange-600/20 absolute bottom-0 select-none">3</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Action Bar */}
                        <div className="bg-slate-800/50 backdrop-blur-sm p-4 rounded-2xl shadow-lg border border-slate-700 flex flex-col lg:flex-row gap-4 justify-between items-center">
                            <div className="text-center lg:text-left">
                                <h2 className="text-lg font-bold text-slate-200 flex items-center justify-center lg:justify-start gap-2">
                                    {viewMode === 'individual' ? 'Player Standings' : 'Group Standings'}
                                </h2>
                                {isAdmin && (
                                    <div className="flex items-center gap-3 text-xs text-slate-400 mt-1">
                                        <span>Editing: <span className="text-blue-400 font-bold">Day {activeDay}</span></span>
                                        <span className="w-1 h-1 bg-slate-600 rounded-full"></span>
                                        <span className="text-emerald-400 flex items-center gap-1"><Save className="w-3 h-3"/> Auto-Save ON</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                                <div className="relative flex-grow sm:flex-grow-0">
                                    <Search className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
                                    <input type="text" placeholder="Search..." className="w-full sm:w-64 bg-slate-900/50 border border-slate-700 rounded-xl pl-10 pr-4 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-slate-200 outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                {isAdmin && (
                                    <div className="flex gap-2 flex-wrap justify-center sm:justify-end">
                                        <button onClick={addParticipant} className="btn-secondary" title="Add Player"><UserPlus className="w-4 h-4" /></button>
                                        <button onClick={() => setShowGroupManager(true)} className="btn-secondary" title="Manage Groups"><Layers className="w-4 h-4" /></button>
                                        <button onClick={() => resetScores('daily')} className="btn-secondary" title="Reset Scores"><RotateCcw className="w-4 h-4" /></button>
                                        <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                        <button onClick={downloadBackup} className="btn-secondary" style={{color: '#60a5fa'}} title="Save Backup"><Save className="w-4 h-4" /> Save</button>
                                        <button onClick={() => fileInputRef.current.click()} className="btn-secondary" style={{color: '#34d399'}} title="Restore Backup"><Upload className="w-4 h-4" /> Load</button>
                                        <button onClick={exportToCSV} className="btn-primary ml-2" title="Export CSV"><FileJson className="w-4 h-4" /> CSV</button>
                                        <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                        <button onClick={() => resetScores('hard')} className="btn-secondary" style={{color: '#f87171'}} title="Full Reset"><Settings className="w-4 h-4" /></button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* List */}
                        <div className="bg-slate-800 rounded-3xl shadow-xl border border-slate-700 overflow-hidden ring-1 ring-white/5">
                            <div className="grid grid-cols-12 gap-4 p-4 bg-slate-900/80 border-b border-slate-700 text-xs font-bold text-slate-400 uppercase tracking-wider backdrop-blur-sm sticky top-0 z-10">
                                <div className="col-span-2 sm:col-span-1 text-center">Rank</div>
                                <div className="col-span-5 sm:col-span-6 pl-2">Details</div>
                                <div className="col-span-5 text-center">Controls</div>
                            </div>
                            <div className="divide-y divide-slate-700/50">
                                {filteredList.map((item, index) => {
                                    const isGroup = viewMode === 'group';
                                    const id = isGroup ? item.name : item.id;
                                    const name = item.name;
                                    const score = isGroup ? item.totalScore : getTotal(item);
                                    const rank = isGroup ? groupsData.findIndex(g => g.name === item.name) + 1 : sortedParticipants.findIndex(p => p.id === item.id) + 1;
                                    const isTop3 = rank <= 3;
                                    // Inactive styling
                                    const opacityClass = (viewMode === 'individual' && !item.isActive) ? 'opacity-40 grayscale' : '';

                                    return (
                                        <div key={isGroup ? `group-${name}` : `participant-${id}`} className={`grid grid-cols-12 gap-4 p-4 items-center transition-all duration-300 ${opacityClass} ${lastUpdatedId === id ? 'bg-blue-500/10' : 'hover:bg-white/5'}`}>
                                            <div className="col-span-2 sm:col-span-1 flex justify-center">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg border-2 ${getRankStyle(rank - 1)}`}>{getRankIcon(rank - 1)}</div>
                                            </div>
                                            <div className="col-span-5 sm:col-span-6 flex flex-col justify-center min-w-0 pl-2">
                                                {isAdmin && !isGroup ? (
                                                    <div className="flex flex-col gap-1.5">
                                                        <input type="text" value={name} onChange={(e) => updateParticipantData(item.id, 'name', e.target.value)} className="bg-transparent border-b border-dashed border-slate-600 focus:border-blue-500 focus:outline-none py-0.5 text-lg font-bold text-slate-200 w-full" />
                                                        <div className="flex items-center gap-2">
                                                            <div className="relative w-fit">
                                                                <select 
                                                                    value={item.group || ''}
                                                                    onChange={(e) => updateParticipantData(item.id, 'group', e.target.value)}
                                                                    className="bg-slate-900 border border-slate-700 rounded-md px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-32 appearance-none cursor-pointer"
                                                                >
                                                                    <option value="" disabled>Select Group</option>
                                                                    {sanitizedGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                                                </select>
                                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                                                                    <ChevronDown className="h-3 w-3" />
                                                                </div>
                                                            </div>
                                                            {/* Active/Inactive Toggle */}
                                                            <button onClick={() => toggleActive(item.id)} className={`p-1 rounded hover:bg-slate-700 ${item.isActive ? 'text-green-400' : 'text-slate-500'}`} title={item.isActive ? "Active (Visible)" : "Inactive (Hidden in Public)"}>
                                                                {item.isActive ? <Eye className="w-4 h-4"/> : <EyeOff className="w-4 h-4"/>}
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : isAdmin && isGroup ? (
                                                    <input type="text" defaultValue={name} onBlur={(e) => renameGroup(name, e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { renameGroup(name, e.currentTarget.value); e.currentTarget.blur(); } }} className="bg-transparent border-b border-dashed border-slate-600 focus:border-blue-500 focus:outline-none py-0.5 text-lg font-bold text-slate-200 w-full" />
                                                ) : (
                                                    <>
                                                        <span className={`font-bold text-lg truncate ${isTop3 ? 'text-white' : 'text-slate-200'}`}>{name}</span>
                                                        {!isGroup && item.group && <span className="text-xs text-slate-500 font-medium">{item.group}</span>}
                                                    </>
                                                )}
                                            </div>
                                            <div className="col-span-5 flex items-center justify-center gap-2">
                                                {isAdmin ? (
                                                    <div className={`flex items-center bg-slate-900/50 rounded-xl border border-slate-700 p-1 shadow-inner ${!item.isActive && !isGroup ? 'opacity-50 pointer-events-none' : ''}`}>
                                                        <button onClick={() => updateScore(id, -1, isGroup)} className="w-10 h-10 rounded-lg bg-slate-800 text-red-400 hover:bg-red-500/10 hover:text-red-300 flex items-center justify-center active:scale-95 transition-all"><Minus className="w-5 h-5" /></button>
                                                        <div className="w-16 text-center flex flex-col">
                                                            <span className={`text-xl font-bold font-mono leading-none ${isTop3 ? 'text-white' : 'text-slate-300'}`}>{score}</span>
                                                            {item.change !== 0 && <span className={`text-[10px] font-bold animate-bounce ${item.change > 0 ? 'text-green-400' : 'text-red-400'}`}>{item.change > 0 ? '+' : ''}{item.change}</span>}
                                                        </div>
                                                        <button onClick={() => updateScore(id, 1, isGroup)} className="w-10 h-10 rounded-lg bg-slate-800 text-green-400 hover:bg-green-500/10 hover:text-green-300 flex items-center justify-center active:scale-95 transition-all"><Plus className="w-5 h-5" /></button>
                                                    </div>
                                                ) : (
                                                    <span className="text-2xl font-black font-mono text-slate-300">{score}</span>
                                                )}
                                                {isAdmin && (
                                                    <button onClick={() => isGroup ? deleteGroup(name) : removeParticipant(id)} className="w-8 h-8 rounded-full hover:bg-red-500/20 text-slate-600 hover:text-red-400 flex items-center justify-center transition-colors"><Trash2 className="w-4 h-4" /></button>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            {filteredList.length === 0 && <div className="p-16 text-center text-slate-500"><Search className="w-12 h-12 mx-auto mb-4 opacity-20" /><p>No results found</p></div>}
                        </div>
                    </main>
                    <footer className="py-8 text-center text-slate-600 text-xs border-t border-slate-800 bg-slate-900"><p className="font-medium tracking-widest uppercase">Powered by <span className="text-slate-400 font-bold">IGNITE THE CONSULTANT COMPANY LIMITED</span></p></footer>
                    {/* Modals: Group Manager & Wheel (Same as previous, just ensure Wheel filters active) */}
                    {showGroupManager && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-lg border border-slate-700 shadow-2xl">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold flex items-center gap-2 text-white"><Layers className="w-5 h-5 text-blue-400"/> Manage Groups</h2><button onClick={() => setShowGroupManager(false)} className="p-2 hover:bg-slate-700 rounded-full"><X className="w-5 h-5"/></button></div>
                                <div className="flex gap-2 mb-6"><input type="text" value={newGroupName} onChange={(e) => setNewGroupName(e.target.value)} placeholder="New Group Name" className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 focus:border-blue-500 focus:outline-none font-bold text-white"/><button onClick={addGroup} className="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl font-bold text-white"><Plus className="w-6 h-6"/></button></div>
                                <div className="max-h-[50vh] overflow-y-auto space-y-2 pr-2 custom-scrollbar">{sanitizedGroups.map(group => (<div key={group} className="flex items-center justify-between bg-slate-700/50 p-4 rounded-xl border border-slate-600"><div className="font-bold text-slate-200">{group}</div><button onClick={() => deleteGroup(group)} className="p-2 bg-slate-800 text-slate-400 hover:bg-red-500/20 hover:text-red-400 rounded-lg"><Trash2 className="w-4 h-4"/></button></div>))}</div>
                            </div>
                        </div>
                    )}
                    {showWheel && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4 overflow-y-auto">
                            <Confetti active={celebrate} />
                            <div className="relative max-w-xl w-full flex flex-col items-center my-auto">
                                <button onClick={() => setShowWheel(false)} className="absolute top-0 right-0 p-4 text-slate-400 hover:text-white z-50"><X className="w-8 h-8" /></button>
                                {!wheelWinner ? (
                                    <>
                                        <div className="mb-8 text-center"><h2 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 drop-shadow-sm">Spin It!</h2><p className="text-slate-400 mt-2 text-lg">For <span className="text-blue-400 font-bold">Day {activeDay}</span> points</p></div>
                                        <div className="flex bg-slate-800 p-1 rounded-xl mb-8 shadow-lg border border-slate-700">
                                            {['individual', 'group'].map(mode => (<button key={mode} onClick={() => setWheelMode(mode)} className={`flex items-center gap-2 px-6 py-3 rounded-lg text-base font-bold transition-all ${wheelMode === mode ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200'}`}>{mode === 'individual' ? <UserCircle className="w-5 h-5"/> : <Users className="w-5 h-5"/>}<span className="capitalize">{mode}</span></button>))}
                                        </div>
                                        <div className="relative w-80 h-80 sm:w-[450px] sm:h-[450px]">
                                            <div className="w-full h-full rounded-full border-8 border-slate-700 shadow-2xl relative overflow-hidden" style={{ background: getWheelGradient(), transform: `rotate(${wheelRotation}deg)`, transition: isSpinning ? 'transform 3s cubic-bezier(0.2, 0.8, 0.2, 1)' : 'none' }}>
                                              {/* Text Labels inside the wheel */}
                                              {activeWheelItems.map((item, index) => {
                                                  const totalItems = activeWheelItems.length;
                                                  const rotation = (360 / totalItems) * index + (360 / totalItems) / 2;
                                                  const fontSize = totalItems > 12 ? '0.65rem' : totalItems > 8 ? '0.8rem' : '1rem';
                                                  
                                                  return (
                                                      <div 
                                                          key={index} 
                                                          style={{ 
                                                              position: 'absolute', 
                                                              height: '50%', 
                                                              width: '40px', 
                                                              top: 0, 
                                                              left: 'calc(50% - 20px)', 
                                                              transformOrigin: 'bottom center', 
                                                              transform: `rotate(${rotation}deg)`,
                                                              display: 'flex',
                                                              alignItems: 'center',
                                                              justifyContent: 'center', 
                                                              paddingTop: '0', 
                                                              paddingBottom: '0'
                                                          }}
                                                      >
                                                          <span 
                                                              className="text-white font-bold truncate wheel-text-shadow"
                                                              style={{ 
                                                                  fontSize: fontSize,
                                                                  writingMode: 'vertical-rl', 
                                                                  textOrientation: 'mixed',
                                                                  maxHeight: '160px'
                                                              }}
                                                          >
                                                              {item.name}
                                                          </span>
                                                      </div>
                                                  );
                                              })}
                                            </div>
                                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-20 w-8 h-12 bg-white clip-arrow shadow-xl drop-shadow-xl"></div>
                                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-slate-800 rounded-full border-4 border-slate-700 z-20 flex items-center justify-center shadow-2xl"><Sparkles className="w-8 h-8 text-purple-500" /></div>
                                        </div>
                                        <button onClick={spinWheel} disabled={isSpinning} className="mt-12 px-12 py-5 bg-gradient-to-r from-blue-600 to-red-600 rounded-full text-2xl font-black text-white shadow-[0_0_30px_rgba(37,99,235,0.3)] hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:scale-100">{isSpinning ? 'SPINNING...' : 'SPIN!'}</button>
                                    </>
                                ) : (
                                    <div className="bg-slate-800 p-10 rounded-3xl shadow-2xl border border-slate-700 text-center w-full max-w-md relative z-10 animate-[zoomIn_0.3s_ease-out]">
                                        <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-yellow-500 p-4 rounded-full shadow-lg border-4 border-slate-800 animate-bounce"><Crown className="w-10 h-10 text-white fill-white" /></div>
                                        <h3 className="text-sm uppercase tracking-wider text-slate-400 font-bold mb-2 mt-4">Winner</h3>
                                        <div className="text-4xl font-black text-white mb-6 break-words leading-tight">{wheelWinner.name}</div>
                                        <div className="space-y-3">
                                            <button onClick={() => awardWheelPoints(10)} className="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold text-lg shadow-lg">Correct (+10)</button>
                                            <div className="flex gap-3"><button onClick={() => awardWheelPoints(5)} className="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg">Partial (+5)</button><button onClick={() => awardWheelPoints(0)} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl font-bold">Skip</button></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
